<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning is happy</title>
    <script src="data.js"></script>
    <style>
        :root { --primary: #4A90E2; --success: #2ECC71; --danger: #E74C3C; --warning: #F1C40F; --dark: #2C3E50; --light: #ECF0F1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); color: var(--dark); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: var(--primary); text-align: center; }
        
        .hidden { display: none !important; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #357ABD; }
        .btn-success { background: var(--success); color: white; }
        
        /* Setup Screen */
        .config-group { margin-bottom: 20px; }
        .subject-group { margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .topic-list { margin-left: 20px; display: flex; flex-direction: column; gap: 5px; }
        
        /* Quiz Screen */
        #timer { font-size: 20px; font-weight: bold; color: var(--danger); text-align: right; }
        .question-box { font-size: 18px; font-weight: bold; margin: 20px 0; }
        .options-box { display: flex; flex-direction: column; gap: 10px; }
        .option-label { display: block; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .option-label:hover { background: #e9ecef; }
        
        /* Thông báo (Toast) */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast { padding: 15px 25px; margin-bottom: 10px; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: fadein 0.3s, fadeout 0.5s 2s forwards; }
        .toast-correct { background-color: var(--success); }
        .toast-wrong { background-color: var(--danger); }
        @keyframes fadein { from {right: 0; opacity: 0;} to {right: 20px; opacity: 1;} }
        @keyframes fadeout { from {opacity: 1;} to {opacity: 0; display: none;} }
        
        /* History Screen */
        .history-card { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .history-details { font-size: 14px; margin-top: 10px; }
        .correct-text { color: var(--success); font-weight: bold;}
        .wrong-text { color: var(--danger); font-weight: bold;}
    </style>
</head>
<body>

<div id="toast-container"></div>
<div class="container">
    <h1>🚀 LEARNING IS HAPPY</h1>
    
    <div id="setup-screen">
        <h3>Thiết lập bài thi</h3>
        <div class="config-group">
            <label><b>Nền tảng:</b></label>
            <select id="platform-select"><option value="Vioedu">VioEdu</option></select>
            <label style="margin-left: 20px;"><b>Lớp:</b></label>
            <select id="grade-select"><option value="3">Lớp 3</option></select>
        </div>

        <div class="config-group">
            <label><b>Số lượng câu hỏi:</b></label>
            <input type="radio" name="numQ" value="20" checked> 20 câu
            <input type="radio" name="numQ" value="30"> 30 câu
            <input type="radio" name="numQ" value="custom"> Khác: 
            <input type="number" id="customNumQ" style="width: 50px;" min="1" disabled>
        </div>

        <div class="config-group">
            <label><b>Chọn Chủ điểm:</b></label>
            <br><button class="btn btn-primary" style="margin: 10px 0; font-size:12px;" onclick="toggleAllTopics(true)">Chọn tất cả</button>
            <button class="btn btn-primary" style="margin: 10px 0; font-size:12px;" onclick="toggleAllTopics(false)">Bỏ chọn</button>
            <div id="topics-container"></div>
        </div>

        <div style="text-align: center;">
            <button class="btn btn-success" style="font-size: 20px;" onclick="startQuiz()">BẮT ĐẦU THI</button>
            <button class="btn btn-primary" style="margin-left: 10px; font-size: 20px;" onclick="showHistory()">XEM LỊCH SỬ</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer">⏱ Thời gian: 00:00</div>
        <h3 id="question-progress">Câu hỏi 1 / 20</h3>
        <div id="illustration-container" style="text-align: center; margin-bottom: 10px;"></div> 
        <div class="question-box" id="question-text"></div>
        <div class="options-box" id="options-container"></div>

        <div style="text-align: right; margin-top: 20px;">
            <button id="submit-btn" class="btn btn-primary" onclick="submitAndNext()">Câu tiếp theo ➡</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>🎉 HOÀN THÀNH BÀI THI 🎉</h2>
        <h3 id="final-score" style="font-size: 28px; color: var(--danger);">Điểm: 0</h3>
        <p id="final-time" style="text-align: center; font-size: 18px;"></p>
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn btn-primary" onclick="goHome()">Về trang chủ</button>
            <button class="btn btn-success" onclick="showHistory()">Xem chi tiết lịch sử</button>
        </div>
    </div>

    <div id="history-screen" class="hidden">
        <h2>LỊCH SỬ THI (10 BÀI GẦN NHẤT)</h2>
        <div id="history-container"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn btn-primary" onclick="goHome()">Về trang chủ</button>
            <button class="btn btn-danger" onclick="clearHistory()" style="background: var(--danger); color: white;">Xóa lịch sử</button>
        </div>
    </div>
</div>

<script>
    let currentExamQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let totalExamTime = 0;
    let questionStartTime = 0;
    let examTimerInterval;
    let currentExamHistoryRecord = {};

    window.onload = () => {
        if(typeof CURRICULUM === 'undefined') {
            alert("Lỗi: Không tìm thấy file data.js. Vui lòng kiểm tra lại cấu trúc file!");
            return;
        }
        renderTopicSelection();
        document.getElementsByName('numQ').forEach(radio => {
            radio.addEventListener('change', function() { document.getElementById('customNumQ').disabled = (this.value !== 'custom'); });
        });
    };

    function renderTopicSelection() {
        const container = document.getElementById('topics-container');
        let html = '';
        for (let subject in CURRICULUM) {
            html += `<div class="subject-group">
                        <label><b><input type="checkbox" class="subject-cb" onchange="toggleSubject(this, '${subject}')" checked> Môn ${subject}</b></label>
                        <div class="topic-list" id="list-${subject}">`;
            CURRICULUM[subject].forEach(topic => { html += `<label><input type="checkbox" class="topic-cb" value="${topic}" checked> ${topic}</label>`; });
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }

    function toggleAllTopics(isChecked) { document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = isChecked); }
    function toggleSubject(subjectCb, subjectStr) { document.getElementById(`list-${subjectStr}`).querySelectorAll('.topic-cb').forEach(cb => cb.checked = subjectCb.checked); }

    function showToast(isCorrect) {
        const toast = document.createElement('div');
        toast.className = `toast ${isCorrect ? 'toast-correct' : 'toast-wrong'}`;
        toast.innerHTML = isCorrect ? "✅ Câu trước: <b>Đúng!</b>" : "❌ Câu trước: <b>Sai rồi!</b>";
        const container = document.getElementById('toast-container');
        container.appendChild(toast);
        setTimeout(() => { if(container.contains(toast)) toast.remove(); }, 2500);
    }

    function startQuiz() {
        const selectedTopics = Array.from(document.querySelectorAll('.topic-cb:checked')).map(cb => cb.value);
        if(selectedTopics.length === 0) return alert("Mẹ nhắc Tiểu Long chọn ít nhất 1 chủ điểm nhé!");

        let numQ = document.querySelector('input[name="numQ"]:checked').value;
        numQ = numQ === 'custom' ? parseInt(document.getElementById('customNumQ').value) : parseInt(numQ);
        if (!numQ || numQ <= 0) return alert("Vui lòng nhập số câu hỏi hợp lệ!");

        let availableQuestions = QUESTION_BANK.filter(q => selectedTopics.includes(q.topic));
        if (availableQuestions.length === 0) return alert("Kho câu hỏi của các chủ điểm này hiện đang trống!");
        
        availableQuestions = availableQuestions.sort(() => 0.5 - Math.random());
        currentExamQuestions = availableQuestions.slice(0, numQ);

        currentQuestionIndex = 0; score = 0; totalExamTime = 0;
        currentExamHistoryRecord = { date: new Date().toLocaleString(), score: 0, totalTime: 0, details: [] };

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        startTimer(); loadQuestion();
    }

    function startTimer() {
        clearInterval(examTimerInterval);
        examTimerInterval = setInterval(() => {
            totalExamTime++;
            const mins = String(Math.floor(totalExamTime / 60)).padStart(2, '0');
            const secs = String(totalExamTime % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `⏱ Thời gian: ${mins}:${secs}`;
        }, 1000);
    }

   function loadQuestion() {
    questionStartTime = totalExamTime; 
    const q = currentExamQuestions[currentQuestionIndex];
    
    document.getElementById('question-progress').innerText = `Câu hỏi ${currentQuestionIndex + 1} / ${currentExamQuestions.length}`;
    document.getElementById('question-text').innerText = q.question;
    
    // --- PHẦN VẼ HÌNH TỰ ĐỘNG ---
    const illusContainer = document.getElementById('illustration-container');
    illusContainer.innerHTML = ''; // Xóa hình cũ

    if (q.topic.includes("Trung điểm")) {
        // Tự động tìm tên đoạn thẳng (ví dụ AB, CD) và trung điểm (M, N, I) từ đề bài
        let points = q.question.match(/[A-Z]{1,2}/g) || ["A", "B", "M"];
        let p1 = points[1] ? points[1][0] : "A";
        let p2 = points[1] ? points[1][1] : "B";
        let mid = points[0] || "M";

        illusContainer.innerHTML = `
            <svg width="300" height="60">
                <line x1="50" y1="30" x2="250" y2="30" stroke="#2C3E50" stroke-width="3" />
                <circle cx="50" cy="30" r="5" fill="#E74C3C" />
                <circle cx="150" cy="30" r="5" fill="#E74C3C" />
                <circle cx="250" cy="30" r="5" fill="#E74C3C" />
                <text x="45" y="55" font-weight="bold">${p1}</text>
                <text x="145" y="55" font-weight="bold">${mid}</text>
                <text x="245" y="55" font-weight="bold">${p2}</text>
                <path d="M50 20 L50 10 L145 10 M155 10 L250 10 L250 20" fill="none" stroke="#4A90E2" />
                <text x="90" y="25" font-size="10" fill="#4A90E2">=</text>
                <text x="190" y="25" font-size="10" fill="#4A90E2">=</text>
            </svg>`;
    } else if (q.topic.includes("hình tròn")) {
        illusContainer.innerHTML = `
            <svg width="150" height="150">
                <circle cx="75" cy="75" r="50" fill="none" stroke="#2C3E50" stroke-width="2" />
                <circle cx="75" cy="75" r="4" fill="#E74C3C" />
                <line x1="75" y1="75" x2="115" y2="45" stroke="#4A90E2" stroke-width="2" />
                <text x="65" y="85" font-size="12" font-weight="bold">O</text>
                <text x="118" y="45" font-size="12" font-weight="bold">A</text>
            </svg>`;
    }
    // ----------------------------

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    
    if (!q.type || q.type === "mcq") {
        q.options.forEach((opt, index) => {
            optionsContainer.innerHTML += `<label class="option-label"><input type="radio" name="ans" value="${index}"> ${opt}</label>`;
        });
    } else if (q.type === "fib") {
        optionsContainer.innerHTML = `<input type="text" id="fib-answer" placeholder="Nhập số kết quả..." style="padding: 15px; font-size: 18px; width: 100%; border-radius: 5px; border: 2px solid var(--primary); box-sizing: border-box; font-weight: bold;">`;
    }

    const btn = document.getElementById('submit-btn');
    btn.innerText = (currentQuestionIndex === currentExamQuestions.length - 1) ? "Nộp bài và Xem Điểm" : "Câu tiếp theo ➡";
}

    function submitAndNext() {
        const q = currentExamQuestions[currentQuestionIndex];
        let isCorrect = false;
        let studentAnswer = "";
        let correctAnswerToSave = "";

        // LẤY VÀ KIỂM TRA ĐÁP ÁN DỰA TRÊN LOẠI CÂU HỎI
        if (!q.type || q.type === "mcq") {
            const selected = document.querySelector('input[name="ans"]:checked');
            if (!selected) return alert("Tiểu Long ơi, con chưa chọn đáp án kìa!");
            
            const selectedIdx = parseInt(selected.value);
            studentAnswer = q.options[selectedIdx];
            correctAnswerToSave = q.options[q.answer];
            isCorrect = (selectedIdx === q.answer);
        } else if (q.type === "fib") {
            const inputField = document.getElementById('fib-answer');
            if (!inputField.value.trim()) return alert("Tiểu Long ơi, con chưa điền kết quả kìa!");
            
            studentAnswer = inputField.value.trim();
            correctAnswerToSave = q.answer;
            // Xóa dấu cách thừa để chấm điểm chính xác
            isCorrect = (studentAnswer.replace(/\s+/g, '') === String(q.answer).replace(/\s+/g, ''));
        }
        
        if (isCorrect) score += 10;
        showToast(isCorrect);

        currentExamHistoryRecord.details.push({
            question: q.question,
            correctAnswer: correctAnswerToSave,
            studentAnswer: studentAnswer,
            isCorrect: isCorrect,
            timeTaken: totalExamTime - questionStartTime
        });

        currentQuestionIndex++;
        if (currentQuestionIndex < currentExamQuestions.length) {
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        clearInterval(examTimerInterval);
        currentExamHistoryRecord.score = score;
        currentExamHistoryRecord.totalTime = totalExamTime;
        saveHistory(currentExamHistoryRecord);

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Điểm: ${score} / ${currentExamQuestions.length * 10}`;
        const mins = String(Math.floor(totalExamTime / 60)).padStart(2, '0');
        const secs = String(totalExamTime % 60).padStart(2, '0');
        document.getElementById('final-time').innerText = `Tổng thời gian làm bài: ${mins} phút ${secs} giây`;
    }

    function saveHistory(record) {
        let history = JSON.parse(localStorage.getItem('vioeduHistory') || '[]');
        history.unshift(record);
        if (history.length > 10) history.pop();
        localStorage.setItem('vioeduHistory', JSON.stringify(history));
    }

    function showHistory() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('history-screen').classList.remove('hidden');

        const historyContainer = document.getElementById('history-container');
        let history = JSON.parse(localStorage.getItem('vioeduHistory') || '[]');
        if (history.length === 0) return historyContainer.innerHTML = "<p>Chưa có dữ liệu bài thi nào.</p>";

        let html = "";
        history.forEach((record, index) => {
            const mins = Math.floor(record.totalTime / 60);
            const secs = record.totalTime % 60;
            html += `<div class="history-card">
                        <h3>Lần thi ${history.length - index}: ${record.date}</h3>
                        <p><b>Điểm:</b> <span class="correct-text">${record.score}</span> | <b>Tổng thời gian:</b> ${mins}p ${secs}s</p>
                        <button class="btn btn-primary" style="font-size: 12px; padding: 5px 10px;" onclick="document.getElementById('hist-detail-${index}').classList.toggle('hidden')">Xem/Ẩn chi tiết</button>
                        <div id="hist-detail-${index}" class="history-details hidden">`;
            record.details.forEach((dt, qIndex) => {
                html += `<div style="margin-top: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 5px;">
                            <p><b>Câu ${qIndex + 1}:</b> ${dt.question}</p>
                            <p>Thời gian làm: ${dt.timeTaken} giây</p>
                            <p>Con chọn: <span class="${dt.isCorrect ? 'correct-text' : 'wrong-text'}">${dt.studentAnswer}</span></p>
                            ${!dt.isCorrect ? `<p>Đáp án đúng: <span class="correct-text">${dt.correctAnswer}</span></p>` : ''}
                         </div>`;
            });
            html += `</div></div>`;
        });
        historyContainer.innerHTML = html;
    }

    function clearHistory() {
        if(confirm("Bạn có chắc muốn xóa toàn bộ lịch sử thi không?")) {
            localStorage.removeItem('vioeduHistory'); showHistory();
        }
    }

    function goHome() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('history-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
